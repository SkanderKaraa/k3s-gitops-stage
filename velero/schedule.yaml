apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: sauvegarde-quotidienne
  namespace: velero
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
    argocd.argoproj.io/sync-options: Prune=false
spec:
  schedule: "0 2 * * *"
  template:
    includedNamespaces:
      - webapp
      - minio
    defaultVolumesToFsBackup: true
    ttl: 336h0m0s
    storageLocation: default
