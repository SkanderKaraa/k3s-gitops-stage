# ================================================================
# kube-prometheus-stack — values.yaml
# Calibré pour VM 8 Go RAM — K3s mono-nœud — lab stage
# ================================================================

# ─── Prometheus ─────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    retention: 7d
    retentionSize: 4GB
    scrapeInterval: 30s
    evaluationInterval: 30s

    resources:
      requests:
        memory: 512Mi
        cpu: 250m
      limits:
        memory: 1Gi
        cpu: 500m

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

    # Découverte automatique dans tous les namespaces
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

# ─── Grafana ─────────────────────────────────────────────────────
grafana:
  enabled: true
  adminPassword: "MonMotDePasseGrafana"

  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m

  service:
    type: NodePort
    nodePort: 30300

  persistence:
    enabled: true
    storageClassName: local-path
    size: 1Gi

  # Dashboards auto-importés au démarrage
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          folder: ''
          type: file
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      node-exporter:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
      kubernetes-pods:
        gnetId: 6781
        revision: 1
        datasource: Prometheus

  # Désactiver les plugins lourds inutiles en lab
  grafana.ini:
    analytics:
      check_for_updates: false
      reporting_enabled: false
    plugins:
      enable_alpha: false

# ─── Alertmanager — désactivé en lab (économie RAM) ─────────────
alertmanager:
  enabled: false

# ─── node_exporter ───────────────────────────────────────────────
nodeExporter:
  enabled: true
  resources:
    requests:
      memory: 32Mi
      cpu: 50m
    limits:
      memory: 64Mi
      cpu: 100m

# ─── kube-state-metrics ──────────────────────────────────────────
kubeStateMetrics:
  enabled: true
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m

# ─── Prometheus Operator ─────────────────────────────────────────
prometheusOperator:
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m

# ─── Désactiver les composants non compatibles K3s ───────────────
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
