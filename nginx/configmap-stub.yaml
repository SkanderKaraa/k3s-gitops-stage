apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-stub-config
  namespace: webapp
data:
  default.conf: |
    server {
        listen 80;
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
        }
    }
  stub.conf: |
    server {
        listen 8080;
        location /stub_status {
            stub_status on;
            allow 127.0.0.1;
            deny all;
        }
    }
