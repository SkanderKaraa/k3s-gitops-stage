apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: webapp
  labels:
    app: nginx
    managed-by: argocd
spec:
  replicas: 5
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.25
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/stub.conf
          subPath: stub.conf
        - name: web-data
          mountPath: /usr/share/nginx/html/data

      - name: nginx-exporter
        image: nginx/nginx-prometheus-exporter:1.1.0
        args:
          - --nginx.scrape-uri=http://localhost:8080/stub_status
        ports:
        - containerPort: 9113
          name: metrics
        resources:
          limits:
            memory: 32Mi
            cpu: 50m

      volumes:
      - name: nginx-config
        configMap:
          name: nginx-stub-config
      - name: web-data
        persistentVolumeClaim:
          claimName: nginx-pvc
